version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: delay-queue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    container_name: delay-queue-app
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - GIN_MODE=release
    depends_on:
      - redis

volumes:
  redis-data: